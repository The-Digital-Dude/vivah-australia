name: Database Backup

on:
  schedule:
    # Runs nightly at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      upload_to_s3:
        description: 'Upload archive to S3 after backup'
        required: false
        default: 'false'
        type: boolean

jobs:
  backup:
    name: MongoDB Backup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install MongoDB Database Tools
        run: |
          wget -q https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2204-x86_64-100.10.0.tgz
          tar -xzf mongodb-database-tools-ubuntu2204-x86_64-100.10.0.tgz
          sudo cp mongodb-database-tools-ubuntu2204-x86_64-100.10.0/bin/* /usr/local/bin/
          mongodump --version

      - name: Run database backup
        env:
          MONGODB_URI: ${{ secrets.BACKUP_MONGODB_URI }}
          BACKUP_DIR: /tmp/vivah-backups
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          BACKUP_S3_PREFIX: ${{ vars.BACKUP_S3_PREFIX || 'backups' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'ap-southeast-2' }}
        run: |
          if [ -z "$MONGODB_URI" ]; then
            echo "ℹ️  BACKUP_MONGODB_URI not configured — skipping backup."
            echo "   Set BACKUP_MONGODB_URI in GitHub secrets to enable nightly backups."
            exit 0
          fi
          node scripts/db-backup.mjs

      - name: Upload backup archive as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vivah-db-backup-${{ github.run_id }}
          path: /tmp/vivah-backups/*.tar.gz
          retention-days: 30
          if-no-files-found: ignore

      - name: Alert on failure
        if: failure()
        env:
          BACKGROUND_JOB_ALERT_WEBHOOK_URL: ${{ secrets.BACKGROUND_JOB_ALERT_WEBHOOK_URL }}
          BACKGROUND_JOB_NAME: db-backup
          BACKGROUND_JOB_FAILURE_SUMMARY: Nightly database backup workflow failed.
          BACKGROUND_JOB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: node scripts/background-job-alert.mjs
