name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'production'
        type: choice
        options: [production, staging]

# Prevent concurrent deploys to the same environment
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ── API → Railway ──────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy API to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "ℹ️  RAILWAY_TOKEN not configured — skipping API deploy."
            echo "   Set RAILWAY_TOKEN (and optionally RAILWAY_SERVICE_ID) in GitHub secrets to enable."
            exit 0
          fi
          echo "🚀  Installing Railway CLI..."
          npm install -g @railway/cli@latest --quiet
          echo "🚀  Deploying API to Railway..."
          if [ -n "$RAILWAY_SERVICE_ID" ]; then
            railway up --service "$RAILWAY_SERVICE_ID" --detach
          else
            railway up --detach
          fi
          echo "✅  Railway deploy triggered."

  # ── Web → Vercel ───────────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web → Vercel
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Web to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "ℹ️  VERCEL_TOKEN not configured — skipping web deploy."
            echo "   Set VERCEL_TOKEN, VERCEL_ORG_ID and VERCEL_PROJECT_ID in GitHub secrets to enable."
            exit 0
          fi
          echo "🚀  Installing Vercel CLI..."
          npm install -g vercel@latest --quiet
          echo "🚀  Deploying web to Vercel (production)..."
          vercel --prod \
            --token="$VERCEL_TOKEN" \
            --scope="$VERCEL_ORG_ID" \
            --yes
          echo "✅  Vercel deploy complete."

  # ── Post-deploy: notify on failure ────────────────────────────────────────
  notify-failure:
    name: Alert on deploy failure
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    if: failure()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send failure alert
        if: ${{ vars.ENABLE_DEPLOY_ALERTS == 'true' || secrets.BACKGROUND_JOB_ALERT_WEBHOOK_URL != '' }}
        env:
          BACKGROUND_JOB_ALERT_WEBHOOK_URL: ${{ secrets.BACKGROUND_JOB_ALERT_WEBHOOK_URL }}
          BACKGROUND_JOB_NAME: deploy
          BACKGROUND_JOB_FAILURE_SUMMARY: Production deployment workflow failed.
          BACKGROUND_JOB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: node scripts/background-job-alert.mjs
