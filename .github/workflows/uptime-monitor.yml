name: Uptime Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  uptime-check:
    name: Check Public Health Endpoints
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run uptime checks
        env:
          UPTIME_API_URL: ${{ secrets.UPTIME_API_URL }}
          UPTIME_WEB_URL: ${{ secrets.UPTIME_WEB_URL }}
          UPTIME_TIMEOUT_MS: 15000
        run: node scripts/uptime-check.mjs

      - name: Alert on scheduled job failure
        if: failure()
        env:
          BACKGROUND_JOB_ALERT_WEBHOOK_URL: ${{ secrets.BACKGROUND_JOB_ALERT_WEBHOOK_URL }}
          BACKGROUND_JOB_NAME: uptime-monitor
          BACKGROUND_JOB_FAILURE_SUMMARY: Scheduled uptime monitoring workflow failed.
          BACKGROUND_JOB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: node scripts/background-job-alert.mjs
